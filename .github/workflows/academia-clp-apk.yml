name: Academia CLP APK

on:
  push:
    branches: [main]
    paths:
      - 'academia-clp/**'
      - '.github/workflows/academia-clp-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'academia-clp/**'
      - '.github/workflows/academia-clp-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academia-clp-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Preparar projeto Capacitor
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build-academia-clp apk-saida
          mkdir -p build-academia-clp/www apk-saida
          cp -R academia-clp/. build-academia-clp/www/
          cd build-academia-clp
          npm init -y
          npm install --no-audit --no-fund @capacitor/core@7 @capacitor/cli@7 @capacitor/android@7
          cat > capacitor.config.json <<'JSON'
          {
            "appId": "com.yanbarcelos.academiaclp",
            "appName": "Academia CLP Industrial",
            "webDir": "www",
            "bundledWebRuntime": false,
            "android": {
              "allowMixedContent": false
            }
          }
          JSON
          npx cap add android
          npx cap sync android

      - name: Compilar APK de teste
        shell: bash
        run: |
          set -euo pipefail
          cd build-academia-clp/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Preparar arquivo final
        shell: bash
        run: |
          cp build-academia-clp/android/app/build/outputs/apk/debug/app-debug.apk apk-saida/Academia-CLP-Industrial.apk
          sha256sum apk-saida/Academia-CLP-Industrial.apk > apk-saida/Academia-CLP-Industrial.sha256

      - name: Publicar em Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Academia-CLP-Industrial-APK
          path: |
            apk-saida/Academia-CLP-Industrial.apk
            apk-saida/Academia-CLP-Industrial.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Criar Release automática
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: academia-clp-build-${{ github.run_number }}
          name: Academia CLP Industrial - Build ${{ github.run_number }}
          body: |
            APK gerado automaticamente pelo GitHub Actions.
            Commit: ${{ github.sha }}
          files: |
            apk-saida/Academia-CLP-Industrial.apk
            apk-saida/Academia-CLP-Industrial.sha256
          make_latest: true
