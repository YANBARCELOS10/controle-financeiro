name: Comandos Pro - Gerar APK

on:
  push:
    branches: ["agent/comandos-pro-firebase"]
    paths:
      - "comandos-pro/**"
      - ".github/workflows/comandos-pro-apk.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "comandos-pro/**"
      - ".github/workflows/comandos-pro-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Android 16
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Compilar APK
        working-directory: comandos-pro
        run: gradle --no-daemon clean assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: ComandosPro-v2.1-Android16
          path: comandos-pro/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Disponibilizar APK em Releases
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="comandos-pro-v2.1.0"
          APK="comandos-pro/app/build/outputs/apk/debug/app-debug.apk"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --target "$GITHUB_SHA" --title "Comandos Pro 2.1" --notes "APK Android 16 gerado automaticamente. Firebase preparado para sincronização opcional de progresso e ranking."
          gh release upload "$TAG" "$APK#ComandosPro-v2.1.apk" --clobber
