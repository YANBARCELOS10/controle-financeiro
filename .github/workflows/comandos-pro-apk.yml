name: Comandos Pro 3D - APK

on:
  push:
    branches: ["agent/comandos-pro-firebase"]
    paths:
      - "comandos-pro/**"
      - ".github/workflows/comandos-pro-apk.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "comandos-pro/**"
      - ".github/workflows/comandos-pro-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality-and-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Android 16
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Testes do motor lógico
        working-directory: comandos-pro
        run: gradle --no-daemon testDebugUnitTest

      - name: Análise estática
        working-directory: comandos-pro
        run: gradle --no-daemon lintDebug

      - name: Compilar APK Android 16
        working-directory: comandos-pro
        run: gradle --no-daemon assembleDebug

      - name: Validar APK
        run: |
          APK="comandos-pro/app/build/outputs/apk/debug/app-debug.apk"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/aapt2" dump badging "$APK" | head -n 12
          cp "$APK" "ComandosPro3D-v3.0.1.apk"
          sha256sum "ComandosPro3D-v3.0.1.apk" > "ComandosPro3D-v3.0.1.apk.sha256"

      - name: Publicar artefato testado
        uses: actions/upload-artifact@v4
        with:
          name: ComandosPro3D-v3.0.1-Android16
          path: |
            ComandosPro3D-v3.0.1.apk
            ComandosPro3D-v3.0.1.apk.sha256
            comandos-pro/app/build/reports/tests/testDebugUnitTest/
            comandos-pro/app/build/reports/lint-results-debug.html
          if-no-files-found: error
          retention-days: 30

      - name: Disponibilizar APK em Releases
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="comandos-pro-3d-v3.0.1"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --target "$GITHUB_SHA" --title "Comandos Pro 3D 3.0.1" --notes "Correção de compatibilidade do laboratório 3D: renderizador OpenGL ES 2/3, tratamento seguro de falhas do driver e painel alternativo automático. Uso exclusivamente virtual."
          gh release upload "$TAG" "ComandosPro3D-v3.0.1.apk" "ComandosPro3D-v3.0.1.apk.sha256" --clobber
