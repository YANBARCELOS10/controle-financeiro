name: Aplicar Sprint 1

on:
  push:
    paths:
      - '.github/workflows/apply-sprint1.yml'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Aplicar correções
        run: python apply_sprint1.py
      - name: Publicar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Aplica Financeiro Pro 3.1 Sprint 1" || exit 0
          git push
