<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>Calculadora Teste</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0f172a,#1e293b);font-family:system-ui;color:#fff;padding:18px}.calc{width:min(100%,380px);padding:18px;border:1px solid #ffffff20;border-radius:26px;background:#111827;box-shadow:0 24px 60px #0008}.screen{min-height:110px;padding:18px;border-radius:18px;background:#020617;text-align:right;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}.history{min-height:24px;color:#94a3b8;font-size:15px}.value{font-size:38px;font-weight:800;word-break:break-all}.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}button{border:0;border-radius:17px;padding:18px 8px;font-size:20px;font-weight:800;background:#1e293b;color:white;cursor:pointer;box-shadow:inset 0 1px #ffffff14}button:active{transform:scale(.97)}.op{background:#0f766e}.equal{background:#2563eb}.clear{background:#be123c}.wide{grid-column:span 2}
</style>
</head>
<body>
<main class="calc" aria-label="Calculadora">
<div class="screen"><div class="history" id="history"></div><div class="value" id="display">0</div></div>
<div class="keys">
<button class="clear wide" data-action="clear">Limpar</button><button data-action="back">⌫</button><button class="op" data-value="/">÷</button>
<button data-value="7">7</button><button data-value="8">8</button><button data-value="9">9</button><button class="op" data-value="*">×</button>
<button data-value="4">4</button><button data-value="5">5</button><button data-value="6">6</button><button class="op" data-value="-">−</button>
<button data-value="1">1</button><button data-value="2">2</button><button data-value="3">3</button><button class="op" data-value="+">+</button>
<button class="wide" data-value="0">0</button><button data-value=".">,</button><button class="equal" data-action="equals">=</button>
</div>
</main>
<script>
'use strict';
const display=document.getElementById('display'),historyEl=document.getElementById('history');let expression='';
const show=()=>display.textContent=expression.replaceAll('*','×').replaceAll('/','÷').replaceAll('.',',')||'0';
function append(v){const ops='+-*/',last=expression.slice(-1);if(ops.includes(v)&&(!expression||ops.includes(last))){if(expression&&ops.includes(last))expression=expression.slice(0,-1)+v;return show()}if(v==='.'&&expression.split(/[+\-*/]/).pop().includes('.'))return;expression+=v;show()}
function calculate(){if(!expression)return;try{if(!/^[0-9+\-*/.() ]+$/.test(expression))throw Error();const result=Function('"use strict";return ('+expression+')')();if(!Number.isFinite(result))throw Error();historyEl.textContent=expression.replaceAll('*','×').replaceAll('/','÷')+' =';expression=String(Math.round((result+Number.EPSILON)*1e10)/1e10);show()}catch{display.textContent='Erro';expression='';setTimeout(show,900)}}
document.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{if(b.dataset.value)append(b.dataset.value);if(b.dataset.action==='clear'){expression='';historyEl.textContent='';show()}if(b.dataset.action==='back'){expression=expression.slice(0,-1);show()}if(b.dataset.action==='equals')calculate()}));
window.addEventListener('keydown',e=>{if('0123456789.+-*/'.includes(e.key))append(e.key);else if(e.key==='Enter'){e.preventDefault();calculate()}else if(e.key==='Backspace'){expression=expression.slice(0,-1);show()}else if(e.key==='Escape'){expression='';historyEl.textContent='';show()}});
</script>
</body>
</html>
